<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Recomenda Cine — seu catálogo de séries e filmes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0f033b;
    --surface: #0f033b;
    --surface-2: #222836;
    --amber: #f3c255;
    --teal: #dd0df4;
    --text: #edeef0;
    --muted: #8b92a0;
    --danger: #db1391;
    --radius: 4px;
    --heart: #ff4b5c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{ background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
  .app{ max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

  /* Marquee header */
  .marquee{
    position: relative; padding: 28px 20px 22px; margin-bottom: 28px; border-bottom: 3px solid var(--amber);
    background: repeating-linear-gradient(90deg, var(--surface) 0 22px, #14181f 22px 24px);
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }

  /* ESTILO DA LOGO E TITULO */
  .logo-img {
    height: 40px;
    width: auto;
    margin-right: 15px;
    display: inline-block;
  }
  .marquee h1{ 
    font-family: 'Oswald', sans-serif; 
    font-weight: 700; 
    letter-spacing: 3px; 
    text-transform: uppercase; 
    font-size: 28px; 
    margin: 0; 
    color: var(--amber);
    display: flex;
    align-items: center;
  }

  /* Menu */
  .menu-wrap{ position: relative; }
  .menu-toggle{ background: transparent; border: 1px solid var(--muted); color: var(--muted); border-radius: var(--radius); padding: 8px 12px; font-size: 16px; cursor: pointer; }
  .dropdown-menu{
    position: absolute; top: 100%; right: 0; background: var(--surface-2); border: 1px solid var(--muted); 
    border-radius: 4px; display: none; flex-direction: column; z-index: 100; min-width: 180px;
  }
  .dropdown-menu.open{ display: flex; }
  .dropdown-menu button{ background: none; border: none; color: white; padding: 10px 20px; text-align: left; cursor: pointer; font-family: 'Oswald'; text-transform: uppercase; }
  .dropdown-menu button:hover{ background: var(--bg); color: var(--amber); }

  /* Search & Tabs */
  .search-row{ display:flex; gap:10px; margin-bottom: 22px; }
  .search-row input{ flex:1; background: var(--surface); border: 1px solid var(--surface-2); color: var(--text); padding: 12px; border-radius: var(--radius); font-family: 'Inter', sans-serif; }
  .search-row button, button.primary{ background: var(--amber); color: #1a1206; border: none; padding: 10px 20px; border-radius: var(--radius); cursor: pointer; font-family: 'Oswald'; font-weight: 600; text-transform: uppercase; }

  .tabs{ display:flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid var(--surface-2); }
  .tabs button{ background: transparent; border: none; color: var(--muted); padding: 10px 16px; font-family:'Oswald'; cursor: pointer; border-bottom: 3px solid transparent; }
  .tabs button.active{ color: var(--amber); border-bottom-color: var(--amber); }

  /* Grid & Cards */
  .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 16px; }
  .card{ background: var(--surface); border-radius: var(--radius); overflow: hidden; position: relative; display:flex; flex-direction: column; border: 1px solid var(--surface-2); }
  .poster-wrap{ position:relative; aspect-ratio: 2/3; background: var(--surface-2); }
  .poster-wrap img{ width:100%; height:100%; object-fit:cover; display:block; }
  
  .heart-btn{
    position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6);
    border: none; color: white; border-radius: 50%; width: 30px; height: 30px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; z-index: 10;
  }
  .heart-btn.active{ color: var(--heart); }

  .card .stub{ padding: 12px; border-top: 2px dashed var(--surface-2); flex:1; display:flex; flex-direction:column; gap: 8px;}
  .card .title{ font-size: 14px; font-weight: 600; line-height: 1.2; }
  .card .year{ font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono'; }

  /* Episode Tracking */
  .episodes-toggle{ font-family:'IBM Plex Mono'; font-size: 11px; color: var(--amber); cursor: pointer; text-align:center; padding: 6px 0; border-top: 1px solid var(--surface-2); margin-top: 4px; }
  .episodes-panel{ margin-top: 8px; display:none; flex-direction:column; gap: 6px; max-height: 200px; overflow-y: auto; background: #161b22; padding: 5px; border-radius: 3px; }
  .season-block{ border: 1px solid var(--surface-2); border-radius: 3px; margin-bottom: 4px; }
  .season-header{ display:flex; justify-content:space-between; padding: 6px; cursor:pointer; font-size: 11px; background: var(--surface-2); }
  .episode-list{ padding: 5px; display:none; flex-direction:column; gap:4px; }
  .episode-list.open{ display:flex; }
  .episode-row{ display:flex; align-items:center; gap:8px; font-size: 11px; }

  /* Profile Stats */
  .profile-section{ margin-bottom: 50px; }
  .profile-section h2{ font-family: 'Oswald'; color: var(--amber); text-transform: uppercase; border-bottom: 1px solid var(--surface-2); padding-bottom: 10px; margin-bottom: 20px; }
  .stats-grid{ display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
  .stat-card{ background: var(--surface-2); padding: 20px; border-radius: var(--radius); border-left: 4px solid var(--teal); }
  .stat-card .val{ font-size: 20px; font-weight: bold; color: var(--teal); font-family: 'IBM Plex Mono'; }
  .stat-card .lbl{ font-size: 11px; color: var(--muted); text-transform: uppercase; margin-top: 5px; }

  .custom-list-input{ width: 100%; background: var(--bg); border: 1px solid var(--surface-2); color: white; font-size: 11px; padding: 6px; border-radius: 3px; }
  .empty{ color: var(--muted); font-family: 'IBM Plex Mono'; padding: 40px; text-align: center; border: 1px dashed var(--surface-2); grid-column: 1 / -1; }
</style>
</head>
<body>
  <div class="app">
    <div class="marquee">
      <div>
        <h1>
          <img src="logo_sem_bg.png" alt="Logo" class="logo-img"> 
          Recomenda Cine
        </h1>
        <p>seu catálogo pessoal de séries e filmes</p>
      </div>
      <div class="menu-wrap">
        <button class="menu-toggle" id="menuToggle">☰ MENU</button>
        <div class="dropdown-menu" id="mainMenu">
          <button onclick="showView('home')">🏠 Home</button>
          <button onclick="showView('profile')">👤 Perfil</button>
          <button onclick="showView('import')">📤 Importar</button>
        </div>
      </div>
    </div>

    <section id="view-home">
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Buscar série ou filme…" />
        <button id="searchBtn">Buscar</button>
      </div>
      <div id="searchStatus"></div>
      <div class="grid" id="searchResults" style="margin-bottom: 40px;"></div>

      <div class="tabs" id="tabs">
        <button data-tab="all" class="active">Tudo</button>
        <button data-tab="want">Quero ver</button>
        <button data-tab="watching">Vendo agora</button>
        <button data-tab="watched">Já vi</button>
      </div>
      <div class="grid" id="listGrid"></div>
      <div id="homeEmpty" class="empty" style="display:none;">Sua lista está vazia.</div>
    </section>

    <section id="view-profile" style="display:none;">
      <div class="profile-section">
        <h2>1) Estatísticas</h2>
        <div class="stats-grid" id="statsGrid"></div>
      </div>
      <div class="profile-section">
        <h2>2) Quero Ver (Listas)</h2>
        <div class="grid" id="profileWantGrid"></div>
      </div>
      <div class="profile-section">
        <h2>3) Séries (Vendo / Vistas)</h2>
        <div class="grid" id="profileSeriesGrid"></div>
      </div>
      <div class="profile-section">
        <h2>4) Filmes já vistos</h2>
        <div class="grid" id="profileMoviesGrid"></div>
      </div>
      <div class="profile-section">
        <h2>5) Séries Favoritas ❤️</h2>
        <div class="grid" id="favSeriesGrid"></div>
      </div>
      <div class="profile-section">
        <h2>6) Filmes Favoritos ❤️</h2>
        <div class="grid" id="favMoviesGrid"></div>
      </div>
    </section>

    <section id="view-import" style="display:none;">
       <div class="profile-section">
          <h2>Importar Dados (CSV)</h2>
          <input type="file" id="csvFile" accept=".csv" />
          <div id="importLog"></div>
       </div>
    </section>
  </div>

<script>
// --- IMPORTANTE: COLOQUE SUA CHAVE AQUI ---
const CONFIG_API_KEY = "460f4aa9be26a5c51685542c2ee0984d"; 

let watchlist = JSON.parse(localStorage.getItem('watchlist') || '{}');

function save() { localStorage.setItem('watchlist', JSON.stringify(watchlist)); }

async function fetchTMDB(endpoint) {
  const res = await fetch(`https://api.themoviedb.org/3/${endpoint}?api_key=${CONFIG_API_KEY}&language=pt-BR`);
  if(!res.ok) return { results: [] };
  return res.json();
}

// --- BUSCA ---
const searchBtn = document.getElementById('searchBtn');
const searchInput = document.getElementById('searchInput');

async function doSearch() {
  const q = searchInput.value.trim();
  if(!q) return;
  
  document.getElementById('searchStatus').innerHTML = 'Buscando...';
  const data = await fetchTMDB(`search/multi?query=${encodeURIComponent(q)}`);
  document.getElementById('searchStatus').innerHTML = '';
  
  const resultsEl = document.getElementById('searchResults');
  resultsEl.innerHTML = '';
  
  if(!data.results || data.results.length === 0) {
    document.getElementById('searchStatus').innerHTML = 'Nenhum resultado.';
    return;
  }

  data.results.filter(r => r.media_type === 'tv' || r.media_type === 'movie').forEach(item => {
    const key = `${item.media_type}-${item.id}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="poster-wrap"><img src="https://image.tmdb.org/t/p/w300${item.poster_path || ''}" alt=""></div>
      <div class="stub">
        <div class="title">${item.title || item.name}</div>
        <button class="primary" onclick="addToWatchlist(${item.id}, '${item.media_type}')">${watchlist[key] ? 'Na lista ✓' : '+ Adicionar'}</button>
      </div>
    `;
    resultsEl.appendChild(card);
  });
}

searchBtn.onclick = doSearch;
searchInput.onkeydown = (e) => { if(e.key === 'Enter') doSearch(); };

async function addToWatchlist(id, type) {
  const details = await fetchTMDB(`${type}/${id}`);
  const key = `${type}-${id}`;
  watchlist[key] = {
    id, type, title: details.title || details.name,
    poster: details.poster_path,
    year: (details.release_date || details.first_air_date || '').slice(0,4),
    status: 'want',
    runtime: details.runtime || (details.episode_run_time ? details.episode_run_time[0] : 0) || 0,
    totalEpisodes: details.number_of_episodes || 0,
    watched: {}, 
    favorite: false,
    customList: ''
  };
  save();
  document.getElementById('searchResults').innerHTML = '';
  searchInput.value = '';
  renderList();
}

// --- RENDERIZAÇÃO ---
let currentTab = 'all';

function renderCard(key, item, container) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.key = key;
  const isTv = item.type === 'tv';
  
  card.innerHTML = `
    <div class="poster-wrap">
      <img src="https://image.tmdb.org/t/p/w300${item.poster}" alt="">
      <button class="heart-btn ${item.favorite ? 'active' : ''}" onclick="toggleFav('${key}', event)">❤</button>
    </div>
    <div class="stub">
      <div class="title">${item.title}</div>
      <div class="year">${item.year}</div>
      <select onchange="updateStatus('${key}', this.value)">
        <option value="want" ${item.status==='want'?'selected':''}>Quero ver</option>
        <option value="watching" ${item.status==='watching'?'selected':''}>Vendo agora</option>
        <option value="watched" ${item.status==='watched'?'selected':''}>Já vi</option>
      </select>
      <input type="text" class="custom-list-input" placeholder="Nova lista..." value="${item.customList || ''}" onchange="updateCustomList('${key}', this.value)">
      ${isTv ? `<div class="episodes-toggle" onclick="toggleEpisodesPanel('${key}')">Episódios ▾</div><div class="episodes-panel"></div>` : ''}
      <button style="margin-top:auto; font-size:10px; background:none; border:none; color:var(--danger); cursor:pointer;" onclick="remove('${key}')">Remover</button>
    </div>
  `;
  container.appendChild(card);
}

// --- FUNÇÕES GERAIS ---
function showView(viewName) {
  ['home', 'profile', 'import'].forEach(v => document.getElementById(`view-${v}`).style.display = v === viewName ? 'block' : 'none');
  document.getElementById('mainMenu').classList.remove('open');
  if(viewName === 'profile') renderProfile();
  if(viewName === 'home') renderList();
}

document.getElementById('menuToggle').onclick = (e) => { e.stopPropagation(); document.getElementById('mainMenu').classList.toggle('open'); };
document.addEventListener('click', () => document.getElementById('mainMenu').classList.remove('open'));

function renderList() {
  const grid = document.getElementById('listGrid');
  grid.innerHTML = '';
  const items = Object.entries(watchlist).filter(([k, i]) => currentTab === 'all' || i.status === currentTab);
  document.getElementById('homeEmpty').style.display = items.length === 0 ? 'block' : 'none';
  items.forEach(([key, item]) => renderCard(key, item, grid));
}

function updateStatus(key, val) { watchlist[key].status = val; save(); renderList(); }
function updateCustomList(key, val) { watchlist[key].customList = val; save(); }
function toggleFav(key, e) { e.stopPropagation(); watchlist[key].favorite = !watchlist[key].favorite; save(); renderList(); if(document.getElementById('view-profile').style.display === 'block') renderProfile(); }
function remove(key) { if(confirm('Remover?')) { delete watchlist[key]; save(); renderList(); if(document.getElementById('view-profile').style.display === 'block') renderProfile(); } }

async function toggleEpisodesPanel(key) {
  const item = watchlist[key];
  const card = document.querySelector(`.card[data-key="${key}"]`);
  const panel = card.querySelector('.episodes-panel');
  if(panel.style.display === 'flex') { panel.style.display = 'none'; return; }
  panel.style.display = 'flex';
  if(panel.innerHTML !== '') return;
  panel.innerHTML = '<div style="font-size:10px;">Carregando...</div>';
  const data = await fetchTMDB(`tv/${item.id}`);
  panel.innerHTML = '';
  data.seasons.filter(s => s.season_number > 0).forEach(s => {
    const sBlock = document.createElement('div');
    sBlock.className = 'season-block';
    sBlock.innerHTML = `<div class="season-header" onclick="toggleEpList(this)"><span>Temp. ${s.season_number}</span><span class="count">${(item.watched[s.season_number] || []).length}/${s.episode_count}</span></div><div class="episode-list" data-s="${s.season_number}"></div>`;
    panel.appendChild(sBlock);
  });
}

async function toggleEpList(header) {
  const list = header.nextElementSibling;
  const sNum = list.dataset.s;
  const key = header.closest('.card').dataset.key;
  const item = watchlist[key];
  list.classList.toggle('open');
  if(list.innerHTML !== '') return;
  const data = await fetchTMDB(`tv/${item.id}/season/${sNum}`);
  list.innerHTML = '';
  data.episodes.forEach(ep => {
    const row = document.createElement('label');
    row.className = 'episode-row';
    const isWatched = (item.watched[sNum] || []).includes(ep.episode_number);
    row.innerHTML = `<input type="checkbox" ${isWatched ? 'checked' : ''} onchange="toggleEp('${key}', ${sNum}, ${ep.episode_number}, this)"><span>E${ep.episode_number} - ${ep.name}</span>`;
    list.appendChild(row);
  });
}

function toggleEp(key, sNum, epNum, checkbox) {
  const item = watchlist[key];
  if(!item.watched[sNum]) item.watched[sNum] = [];
  if(checkbox.checked) item.watched[sNum].push(epNum);
  else item.watched[sNum] = item.watched[sNum].filter(n => n !== epNum);
  const header = checkbox.closest('.season-block').querySelector('.count');
  const total = header.innerText.split('/')[1];
  header.innerText = `${item.watched[sNum].length}/${total}`;
  save();
}

function formatTime(totalMinutes) {
  const years = Math.floor(totalMinutes / (60 * 24 * 365));
  totalMinutes %= (60 * 24 * 365);
  const months = Math.floor(totalMinutes / (60 * 24 * 30));
  totalMinutes %= (60 * 24 * 30);
  const days = Math.floor(totalMinutes / (60 * 24));
  totalMinutes %= (60 * 24);
  const hours = Math.floor(totalMinutes / 60);
  let parts = [];
  if (years > 0) parts.push(`${years}a`);
  if (months > 0) parts.push(`${months}m`);
  if (days > 0) parts.push(`${days}d`);
  if (hours > 0) parts.push(`${hours}h`);
  return parts.join(' ') || '0h';
}

function renderProfile() {
  let tvMinutes = 0, movieMinutes = 0, epCount = 0, movieCount = 0;
  ['profileWantGrid', 'profileSeriesGrid', 'profileMoviesGrid', 'favSeriesGrid', 'favMoviesGrid'].forEach(id => document.getElementById(id).innerHTML = '');
  Object.entries(watchlist).forEach(([key, item]) => {
    if(item.type === 'tv') {
      const watchedInSeries = Object.values(item.watched).reduce((acc, curr) => acc + curr.length, 0);
      tvMinutes += (watchedInSeries * item.runtime);
      epCount += watchedInSeries;
      if(item.status !== 'want') renderCard(key, item, document.getElementById('profileSeriesGrid'));
    } else {
      if(item.status === 'watched') { movieMinutes += item.runtime; movieCount++; renderCard(key, item, document.getElementById('profileMoviesGrid')); }
    }
    if(item.status === 'want') renderCard(key, item, document.getElementById('profileWantGrid'));
    if(item.favorite) { const target = item.type === 'tv' ? 'favSeriesGrid' : 'favMoviesGrid'; renderCard(key, item, document.getElementById(target)); }
  });
  document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div class="val">${formatTime(tvMinutes)}</div><div class="lbl">Tempo TV</div></div><div class="stat-card"><div class="val">${epCount}</div><div class="lbl">Episódios</div></div><div class="stat-card"><div class="val">${formatTime(movieMinutes)}</div><div class="lbl">Tempo Filmes</div></div><div class="stat-card"><div class="val">${movieCount}</div><div class="lbl">Filmes</div></div>`;
}

document.getElementById('tabs').onclick = (e) => {
  if(e.target.dataset.tab) {
    currentTab = e.target.dataset.tab;
    document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('active', b === e.target));
    renderList();
  }
};

renderList();
</script>
</body>
</html>
