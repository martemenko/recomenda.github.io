<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Recomenda Cine — seu catálogo de séries e filmes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0f033b;
    --surface: #0f033b;
    --surface-2: #222836;
    --amber: #f3c255;
    --teal: #dd0df4;
    --text: #edeef0;
    --muted: #8b92a0;
    --danger: #db1391;
    --radius: 4px;
    --heart: #ff4b5c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .app{ max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

  /* Marquee header */
  .marquee{
    position: relative;
    padding: 28px 20px 22px;
    margin-bottom: 28px;
    border-bottom: 3px solid var(--amber);
    background: repeating-linear-gradient(90deg, var(--surface) 0 22px, #14181f 22px 24px);
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .marquee::before, .marquee::after{
    content:""; position:absolute; top:8px; bottom:8px; width:10px;
    background: radial-gradient(circle, var(--amber) 0 3px, transparent 4px) 0 0/10px 14px repeat-y;
    opacity:.9;
  }
  .marquee::before{ left:0; } .marquee::after{ right:0; }
  .marquee h1{ font-family: 'Oswald', sans-serif; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; font-size: 28px; margin: 0; color: var(--amber); }

  /* Menu */
  .menu-wrap{ position: relative; }
  .menu-toggle{
    background: transparent; border: 1px solid var(--muted); color: var(--muted);
    border-radius: var(--radius); padding: 8px 12px; font-size: 16px; cursor: pointer;
  }
  .dropdown-menu{
    position: absolute; top: 100%; right: 0; background: var(--surface-2);
    border: 1px solid var(--muted); border-radius: 4px; display: none; flex-direction: column; z-index: 100;
  }
  .dropdown-menu.open{ display: flex; }
  .dropdown-menu button{
    background: none; border: none; color: white; padding: 10px 20px; text-align: left; cursor: pointer; font-family: 'Oswald';
  }
  .dropdown-menu button:hover{ background: var(--bg); color: var(--amber); }

  /* Search & Tabs */
  .search-row{ display:flex; gap:10px; margin-bottom: 22px; }
  .search-row input{ flex:1; background: var(--surface); border: 1px solid var(--surface-2); color: var(--text); padding: 12px; border-radius: var(--radius); }
  .search-row button, button.primary{ background: var(--amber); color: #1a1206; border: none; padding: 10px 20px; border-radius: var(--radius); cursor: pointer; font-family: 'Oswald'; font-weight: 600; text-transform: uppercase; }

  .tabs{ display:flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid var(--surface-2); }
  .tabs button{ background: transparent; border: none; color: var(--muted); padding: 10px 16px; font-family:'Oswald'; cursor: pointer; border-bottom: 3px solid transparent; }
  .tabs button.active{ color: var(--amber); border-bottom-color: var(--amber); }

  /* Grid & Cards */
  .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 16px; }
  .card{ background: var(--surface); border-radius: var(--radius); overflow: hidden; position: relative; display:flex; flex-direction: column; border: 1px solid var(--surface-2); }
  .poster-wrap{ position:relative; aspect-ratio: 2/3; background: var(--surface-2); }
  .poster-wrap img{ width:100%; height:100%; object-fit:cover; display:block; }
  
  .heart-btn{
    position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6);
    border: none; color: white; border-radius: 50%; width: 30px; height: 30px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .heart-btn.active{ color: var(--heart); }

  .card .stub{ padding: 10px; border-top: 2px dashed var(--surface-2); flex:1; display:flex; flex-direction:column; }
  .card .title{ font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .card .list-tag{ font-size: 10px; background: var(--surface-2); padding: 2px 5px; border-radius: 3px; margin-top: 4px; display: inline-block; }

  /* Profile Stats */
  .profile-section{ margin-bottom: 40px; }
  .profile-section h2{ font-family: 'Oswald'; color: var(--amber); text-transform: uppercase; border-bottom: 1px solid var(--surface-2); padding-bottom: 10px; }
  .stats-grid{ display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
  .stat-card{ background: var(--surface-2); padding: 20px; border-radius: var(--radius); border-left: 4px solid var(--teal); }
  .stat-card .val{ font-size: 20px; font-weight: bold; color: var(--teal); font-family: 'IBM Plex Mono'; }
  .stat-card .lbl{ font-size: 12px; color: var(--muted); text-transform: uppercase; }

  .custom-list-input{ width: 100%; background: var(--bg); border: 1px solid var(--surface-2); color: white; font-size: 11px; padding: 4px; margin-top: 5px; }

  .empty{ color: var(--muted); font-family: 'IBM Plex Mono'; padding: 20px; text-align: center; border: 1px dashed var(--surface-2); }
  [style*="display: none"] { display: none !important; }
</style>
</head>
<body>
  <div class="app">
    <div class="marquee">
      <div>
        <h1>★ Recomenda Cine</h1>
        <p>seu catálogo pessoal de séries e filmes</p>
      </div>
      <div class="menu-wrap">
        <button class="menu-toggle" id="menuToggle">☰ Menu</button>
        <div class="dropdown-menu" id="mainMenu">
          <button onclick="showView('home')">Home</button>
          <button onclick="showView('profile')">Perfil</button>
          <button onclick="showView('import')">Importar Dados</button>
        </div>
      </div>
    </div>

    <!-- VIEW: HOME -->
    <section id="view-home">
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Buscar série ou filme…" />
        <button id="searchBtn">Buscar</button>
      </div>
      <div id="searchStatus"></div>
      <div class="grid" id="searchResults" style="margin-bottom: 40px;"></div>

      <div class="tabs" id="tabs">
        <button data-tab="all" class="active">Tudo</button>
        <button data-tab="want">Quero ver</button>
        <button data-tab="watching">Vendo agora</button>
        <button data-tab="watched">Já vi</button>
      </div>
      <div class="grid" id="listGrid"></div>
    </section>

    <!-- VIEW: PROFILE -->
    <section id="view-profile" style="display:none;">
      <div class="profile-section">
        <h2>1) Estatísticas</h2>
        <div class="stats-grid" id="statsGrid"></div>
      </div>

      <div class="profile-section">
        <h2>2) Quero Ver</h2>
        <div id="customListsArea"></div>
        <div class="grid" id="profileWantGrid"></div>
      </div>

      <div class="profile-section">
        <h2>3) Séries em andamento / vistas</h2>
        <div class="grid" id="profileSeriesGrid"></div>
      </div>

      <div class="profile-section">
        <h2>4) Filmes já vistos</h2>
        <div class="grid" id="profileMoviesGrid"></div>
      </div>

      <div class="profile-section">
        <h2>5) Séries Favoritas ❤️</h2>
        <div class="grid" id="favSeriesGrid"></div>
      </div>

      <div class="profile-section">
        <h2>6) Filmes Favoritos ❤️</h2>
        <div class="grid" id="favMoviesGrid"></div>
      </div>
    </section>

    <!-- VIEW: IMPORT -->
    <section id="view-import" style="display:none;">
       <div class="profile-section">
          <h2>Importar Dados</h2>
          <p>Selecione seu arquivo CSV para importar sua lista.</p>
          <input type="file" id="csvFile" accept=".csv" />
          <div id="csvMapping"></div>
       </div>
    </section>
  </div>

<script>
/** 
 * CONFIGURAÇÃO: Insira sua chave aqui. 
 * Em um repo público, ela estará visível. Para esconder 100% no Github Pages 
 * você precisaria de um servidor/proxy, o que não é possível só com HTML.
 */
const CONFIG_API_KEY = "460f4aa9be26a5c51685542c2ee0984d"; 

let watchlist = JSON.parse(localStorage.getItem('watchlist') || '{}');
let currentTab = 'all';

// --- NAVEGAÇÃO ---
function showView(viewName) {
  document.getElementById('view-home').style.display = viewName === 'home' ? 'block' : 'none';
  document.getElementById('view-profile').style.display = viewName === 'profile' ? 'block' : 'none';
  document.getElementById('view-import').style.display = viewName === 'import' ? 'block' : 'none';
  document.getElementById('mainMenu').classList.remove('open');
  if(viewName === 'profile') renderProfile();
  if(viewName === 'home') renderList();
}

document.getElementById('menuToggle').onclick = () => document.getElementById('mainMenu').classList.toggle('open');

// --- LÓGICA DE DADOS ---
async function fetchDetails(id, type) {
  const url = `https://api.themoviedb.org/3/${type}/${id}?api_key=${CONFIG_API_KEY}&language=pt-BR`;
  const res = await fetch(url);
  return await res.json();
}

function save() {
  localStorage.setItem('watchlist', JSON.stringify(watchlist));
}

// --- BUSCA ---
document.getElementById('searchBtn').onclick = async () => {
  const q = document.getElementById('searchInput').value;
  if(!q) return;
  const url = `https://api.themoviedb.org/3/search/multi?api_key=${CONFIG_API_KEY}&language=pt-BR&query=${encodeURIComponent(q)}`;
  const res = await fetch(url);
  const data = await res.json();
  
  const resultsEl = document.getElementById('searchResults');
  resultsEl.innerHTML = '';
  data.results.filter(r => r.media_type !== 'person').forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="poster-wrap">
        <img src="https://image.tmdb.org/t/p/w300${item.poster_path}" alt="">
      </div>
      <div class="stub">
        <div class="title">${item.title || item.name}</div>
        <button class="primary" onclick="addToWatchlist(${item.id}, '${item.media_type}')">Adicionar</button>
      </div>
    `;
    resultsEl.appendChild(card);
  });
};

async function addToWatchlist(id, type) {
  const details = await fetchDetails(id, type);
  const key = `${type}-${id}`;
  watchlist[key] = {
    id,
    type,
    title: details.title || details.name,
    poster: details.poster_path,
    status: 'want',
    runtime: details.runtime || (details.episode_run_time ? details.episode_run_time[0] : 0) || 0,
    totalEpisodes: details.number_of_episodes || 0,
    watchedEpisodes: 0,
    favorite: false,
    customList: ''
  };
  save();
  alert('Adicionado!');
  renderList();
}

// --- RENDERIZAÇÃO ---
function renderCard(key, item, container) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="poster-wrap">
      <img src="https://image.tmdb.org/t/p/w300${item.poster}" alt="">
      <button class="heart-btn ${item.favorite ? 'active' : ''}" onclick="toggleFav('${key}')">❤</button>
    </div>
    <div class="stub">
      <div class="title">${item.title}</div>
      <select onchange="updateStatus('${key}', this.value)">
        <option value="want" ${item.status==='want'?'selected':''}>Quero ver</option>
        <option value="watching" ${item.status==='watching'?'selected':''}>Vendo</option>
        <option value="watched" ${item.status==='watched'?'selected':''}>Já vi</option>
      </select>
      <input type="text" class="custom-list-input" placeholder="Lista (ex: Terror)" value="${item.customList || ''}" onchange="updateList('${key}', this.value)">
      <button style="margin-top:5px; font-size:9px;" onclick="remove('${key}')">Remover</button>
    </div>
  `;
  container.appendChild(card);
}

function updateStatus(key, status) { watchlist[key].status = status; save(); renderList(); }
function updateList(key, listName) { watchlist[key].customList = listName; save(); }
function toggleFav(key) { watchlist[key].favorite = !watchlist[key].favorite; save(); renderList(); if(document.getElementById('view-profile').style.display === 'block') renderProfile(); }
function remove(key) { delete watchlist[key]; save(); renderList(); renderProfile(); }

function renderList() {
  const grid = document.getElementById('listGrid');
  grid.innerHTML = '';
  Object.entries(watchlist).forEach(([key, item]) => {
    if(currentTab === 'all' || item.status === currentTab) renderCard(key, item, grid);
  });
}

// --- PERFIL E ESTATÍSTICAS ---
function formatTime(minutes) {
  const years = Math.floor(minutes / (60 * 24 * 365));
  minutes %= (60 * 24 * 365);
  const months = Math.floor(minutes / (60 * 24 * 30));
  minutes %= (60 * 24 * 30);
  const days = Math.floor(minutes / (60 * 24));
  minutes %= (60 * 24);
  const hours = Math.floor(minutes / 60);

  let res = [];
  if (years > 0) res.push(`${years}a`);
  if (months > 0) res.push(`${months}m`);
  if (days > 0) res.push(`${days}d`);
  if (hours > 0) res.push(`${hours}h`);
  return res.join(' ') || '0h';
}

function renderProfile() {
  let tvMinutes = 0, movieMinutes = 0, epCount = 0, movieCount = 0;
  
  // Limpar Grids
  const grids = ['profileWantGrid', 'profileSeriesGrid', 'profileMoviesGrid', 'favSeriesGrid', 'favMoviesGrid'];
  grids.forEach(id => document.getElementById(id).innerHTML = '');

  Object.entries(watchlist).forEach(([key, item]) => {
    // Calculo Stats
    if(item.type === 'tv') {
      // Simplificação: se 'watched', conta todos eps. Se 'watching', conta metade (estimativa rápida)
      let mult = item.status === 'watched' ? 1 : (item.status === 'watching' ? 0.5 : 0);
      let watched = Math.floor(item.totalEpisodes * mult);
      tvMinutes += (watched * item.runtime);
      epCount += watched;
      if(item.status !== 'want') renderCard(key, item, document.getElementById('profileSeriesGrid'));
    } else {
      if(item.status === 'watched') {
        movieMinutes += item.runtime;
        movieCount++;
        renderCard(key, item, document.getElementById('profileMoviesGrid'));
      }
    }

    // Seção Quero Ver
    if(item.status === 'want') renderCard(key, item, document.getElementById('profileWantGrid'));
    
    // Favoritos
    if(item.favorite) {
      const favId = item.type === 'tv' ? 'favSeriesGrid' : 'favMoviesGrid';
      renderCard(key, item, document.getElementById(favId));
    }
  });

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="val">${formatTime(tvMinutes)}</div><div class="lbl">Tempo vendo TV</div></div>
    <div class="stat-card"><div class="val">${epCount}</div><div class="lbl">Episódios assistidos</div></div>
    <div class="stat-card"><div class="val">${formatTime(movieMinutes)}</div><div class="lbl">Tempo vendo Filmes</div></div>
    <div class="stat-card"><div class="val">${movieCount}</div><div class="lbl">Filmes assistidos</div></div>
  `;
}

// Inicialização
document.getElementById('tabs').onclick = (e) => {
  if(e.target.dataset.tab) {
    currentTab = e.target.dataset.tab;
    document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderList();
  }
};

renderList();
</script>
</body>
</html>
